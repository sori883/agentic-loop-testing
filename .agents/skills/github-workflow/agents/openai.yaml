interface:
  display_name: "GitHub ワークフロー"
  short_description: "GitHub の PR、CI、review を扱う"
  default_prompt: "$github-workflow を使って、GitHub の branch、PR、CI、review comment を安全に扱ってください。"

dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "GitHub MCP サーバー"
      transport: "streamable_http"
      url: "https://api.githubcopilot.com/mcp/"
