[features]
experimental_use_rmcp_client = true

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "CODEX_GITHUB_PERSONAL_ACCESS_TOKEN"
enabled = true
default_tools_approval_mode = "prompt"
tool_timeout_sec = 60

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"
enabled = true
default_tools_approval_mode = "prompt"
tool_timeout_sec = 60
