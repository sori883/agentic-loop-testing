[memory]
backend = "linear"
source_of_truth = "linear"
scope_name = "loop-managed-linear-issues"
scope_description = "接続済みの Linear ワークスペースにある loop-managed ラベル付き Issue。blocked、needs-human、agent-active、needs-review の対象は除外する。"
issue_title_language = "ja"
issue_title_policy = "Linear Issue の title は日本語で作成する。新規 Issue、同期 Issue、分割 Issue、エスカレーション Issue、title 更新提案では簡潔な日本語の動詞句を使う。固有名詞、コード識別子、API 名、ライブラリ名、エラーコード、Linear/GitHub identifier は原文のまま残してよい。英語原文、ログ、リンク、外部 issue/PR title は description または Comment に残す。"
required_issue_sections = [
  "目的",
  "背景",
  "制約",
  "受け入れ条件",
  "現在の状態",
  "検証",
  "エスカレーション",
]

[discovery]
include_labels = ["loop-managed"]
ready_labels = ["ready-for-agent"]
triage_labels = ["needs-triage"]
exclude_labels = ["blocked", "needs-human", "agent-active", "needs-review"]
include_statuses = ["Backlog", "Todo"]
max_items_per_run = 5
sort = "priority_then_updated"

[repository]
required_tracked_files = [
  ".codex/loop.toml",
  ".codex/config.toml",
  ".codex/agents/",
  ".agents/skills/",
]
worktree_policy = "worktree automation は commit 済みの repository artifact だけを確実に読める。automation を登録する前に、この policy file と参照する agent/skill 定義が Git に含まれていることを確認する。"

[run_modes]
default = "live-run"
allowed = ["setup", "dry-run", "live-run"]
setup_policy = "仕組みを作っている段階。Linear/GitHub の mutation は人間が明示した単発操作に限定し、automation は登録前の設計確認として扱う。"
dry_run_policy = "discovery、triage、claim 可否、実行計画、必要 mutation の提案まで行う。Linear/GitHub の status、label、comment、branch、PR、CI retry は変更しない。"
live_run_policy = "preflight がすべて通っている場合に使う。Linear/GitHub の mutation は write_boundary に従って controller だけが適用する。"
mode_transition_policy = "setup -> dry-run -> live-run の順に進める。live-run から setup/dry-run へ戻す場合は、理由と未完了 work item の扱いを Linear または会話に記録する。"

[preflight]
required_before_automation = true
failure_policy = "必須 check が 1 つでも失敗した場合、automation を live-run 登録しない。必要な修正または人間判断を記録して停止する。"
required_checks = [
  "repository.required_tracked_files が Git に含まれ、worktree automation から読める。",
  ".codex/loop.toml、.codex/config.toml、.codex/agents/*.toml、.agents/skills/*/SKILL.md が構文エラーなく読める。",
  "Linear MCP 認証が通り、memory.required_issue_sections を満たす Issue を読める。",
  "Linear に discovery.include_labels、discovery.ready_labels、discovery.triage_labels、discovery.exclude_labels、workflow.allowed_labels_add で使う label が存在する。",
  "Linear に discovery.include_statuses と workflow.allowed_status_transitions で使う status が存在する。",
  "live-run では loop-managed かつ ready-for-agent または needs-triage の seed Issue が 1 件以上ある。seed Issue がない場合は no-op の dry-run として扱う。",
  "GitHub を使う work item では GitHub MCP または gh/git 認証が通り、対象 repository と base branch を読める。",
  "読み取り専用エージェントが Linear、GitHub、リポジトリファイルの mutation tool を要求しないことを手動 dry-run で確認している。",
  ".codex/config.toml で sandbox_mode = danger-full-access、approval_policy = never、GitHub/Linear MCP default_tools_approval_mode = auto が有効になっている。",
  "Linear Issue の新規作成、同期、分割、エスカレーション、title 更新提案では memory.issue_title_policy に従って日本語 title を含める。",
  "claim 対象は Todo かつ ready-for-agent を持ち、needs-triage を持たないことを dry-run で確認している。",
  "completion_evidence.required_fields と completion_evidence.review_gate_fields を Done 前に埋められる。",
]

[triage]
reader = "triage"
writer = "controller"
write_policy = "triage エージェントは読み取り専用を維持し、Linear の title、status、label、comment 更新案だけを返す。title を提案する場合は memory.issue_title_policy に従い日本語にする。controller は承認した書き込みを linear-memory 経由で適用する。"
completion_policy = "triage が実行可能と判断した Issue は、controller が evidence を確認したうえで needs-triage を外し ready-for-agent を付ける。目的、受け入れ条件、スコープが不足する Issue は ready-for-agent を付けず needs-triage または needs-human に留める。"
allowed_status_transitions = [
  "Backlog -> Todo",
  "Backlog -> In Review",
  "Todo -> In Review",
]
allowed_labels_add = ["needs-triage", "ready-for-agent", "blocked", "needs-human"]
allowed_labels_remove = ["needs-triage", "ready-for-agent", "blocked", "needs-human"]

[claim]
writer = "controller"
required_before_work = true
eligible_statuses = ["Todo"]
triage_only_statuses = ["Backlog"]
required_labels = ["ready-for-agent"]
forbidden_labels = ["needs-triage"]
selection_recheck = "controller は claim 直前に対象 Issue を再読み込みし、status が claim.eligible_statuses に含まれ、ready-for-agent を持ち、discovery.exclude_labels と claim.forbidden_labels を含まないことを確認する。needs-triage が残っている Issue は claim せず、triage の更新提案に戻す。"
backlog_policy = "Backlog の Issue は直接 claim しない。controller は triage の更新提案を確認し、live-run では Backlog -> Todo、needs-triage の削除、ready-for-agent の追加を適用してから Issue を再読み込みし、claim 条件を満たす場合だけ claim する。setup または dry-run では Backlog -> Todo と label 置換の mutation 提案までに留める。"
claim_transition = "Todo -> In Progress"
claim_comment_required = true
claim_comment_template = """
## 状態遷移

変更前:
変更後: In Progress
追加したラベル: agent-active
削除したラベル: ready-for-agent
理由: controller が loop-managed work item を claim し、作業を開始する。
根拠:
次:
"""
labels_add = ["agent-active"]
labels_remove = ["ready-for-agent"]
collision_policy = "再読み込み時に status/label が discovery scope から外れていた場合は、その Issue を変更せず skip し、次の候補を discovery する。候補がなければ no-op として終了する。"
release_on_reject = "review gate または verification が REJECT の場合は、agent-active を保持し、verification-failed または needs-review を付け、次アクションを Comment に記録する。"
release_on_escalate = "人間判断が必要な場合は agent-active を外し、needs-human を付け、status を In Review にして具体的な質問を Comment に記録する。"
release_on_complete = "Done にする直前に completion evidence を Comment に記録し、agent-active と phase label を外す。"

[workflow]
writer = "controller"
write_policy = "controller は担当エージェントの証拠を確認したうえで、claim、review、rejection、completion の状態更新を linear-memory 経由で適用する。"
allowed_status_transitions = [
  "Backlog -> Todo",
  "Backlog -> In Review",
  "Todo -> In Progress",
  "Todo -> In Review",
  "In Progress -> In Review",
  "In Review -> In Progress",
  "In Review -> Done",
  "Any -> Todo",
  "Any -> Canceled",
  "Any -> Duplicate",
]
allowed_labels_add = [
  "needs-triage",
  "ready-for-agent",
  "agent-active",
  "needs-review",
  "needs-human",
  "blocked",
  "verification-failed",
  "loop-improvement",
  "needs-retro",
  "capability-expansion",
  "skill-gap",
  "agent-gap",
  "github-linked",
  "phase-planning",
  "phase-red",
  "phase-green",
  "phase-refactor",
  "phase-verify",
]
allowed_labels_remove = [
  "needs-triage",
  "ready-for-agent",
  "agent-active",
  "needs-review",
  "needs-human",
  "blocked",
  "verification-failed",
  "loop-improvement",
  "needs-retro",
  "capability-expansion",
  "skill-gap",
  "agent-gap",
  "phase-planning",
  "phase-red",
  "phase-green",
  "phase-refactor",
  "phase-verify",
]

[write_boundary]
controller = "main-agent"
read_only_agents = ["triage", "explorer", "phase-reviewer", "verifier"]
mutation_policy = "Linear と GitHub の状態変更、および Linear Issue title 更新は controller だけが適用する。implementer は割り当てられたリポジトリファイルだけを編集できる。読み取り専用エージェントは変更案と証拠だけを返す。読み取り専用エージェントが Linear または GitHub を直接変更した場合は、ポリシー違反として記録しエスカレーションする。"
linear_mutation_tools_allowed_for = ["controller"]
github_mutation_tools_allowed_for = ["controller"]
tool_approval_policy = "setup と dry-run では GitHub と Linear の MCP mutation を自動適用してはいけない。live-run では .codex/config.toml の full-access 設定により controller の MCP mutation を自動適用してよい。automation 登録前の手動テストでは、読み取り専用エージェントが mutation tool を要求していないことを確認する。"
violation_policy = "controller 以外が Linear または GitHub の状態を直接変更した証拠がある場合、その run では Done にせず needs-human としてエスカレーションし、変更内容と再発防止策を Linear Comment に記録する。"

[retrospective]
enabled = true
trigger_policy = "PJ の最後、milestone/release/主要 PR 完了前、または人間が振り返りを要求した場合に実行する。通常 loop 中は悪かった点、詰まり、検証不足、自動化余地を Linear Comment または completion_evidence の loop 改善候補に残し、retrospective で集約する。"
source_scope = "loop-managed Issue と関連 Comment、completion_evidence の loop 改善候補/残るリスク/次のアクション、review gate の REJECT/ESCALATE、verification-failed、needs-human、blocked の履歴を読む。"
read_policy = "controller は retrospective 実行前に対象 Project、Milestone、期間、または対象 Issue 群を特定し、Linear の最新状態を source of truth として読む。"
grouping_policy = "同じ原因、同じ改善先、同じ検証不足を持つメモは 1 つの改善 Issue に統合する。重複する提案、英語原文、ログ、関連 Issue は description または Comment に根拠として集約する。"
issue_creation_policy = "改善が必要な場合は Linear Issue を作成または更新する。title は memory.issue_title_policy に従って日本語にし、labels に loop-managed と loop-improvement を付ける。実行可能なら ready-for-agent、調査や整理が必要なら needs-triage も付ける。"
autofix_policy = "小さく局所的で検証可能な改善だけ、通常 loop と同じ claim、TDD、review gate、completion_evidence ルールで自律実行してよい。広範な設計変更、破壊的変更、権限/費用/外部契約が絡む変更、受け入れ条件が曖昧な改善は needs-human として残す。"
capability_expansion_policy = "既存 skill、agent、automation prompt、loop policy では同じ種類の失敗、迷い、手作業、検証不足を解消できない場合、改善手段として新規 skill または新規 agent の作成を許可する。新規 skill は .agents/skills/<skill-name>/SKILL.md と必要最小限の agents/openai.yaml、references/scripts/assets に限定し、skill-creator の原則に従って簡潔に作る。新規 agent は .codex/agents/<agent-name>.toml に限定し、単一責務、最小権限、controller-only mutation 境界を守る。"
capability_expansion_autofix_policy = "小さく局所的で、外部契約、費用、秘密情報、権限拡大、大量依存追加を伴わない skill/agent 追加または更新は、通常 loop と同じ claim、検証、別エージェント review gate を通したうえで自律実行してよい。既存の権限境界を広げる変更、MCP/tool 権限追加、外部サービス接続、広範な設計変更、責務が曖昧な agent 増加は needs-human として残す。"
capability_expansion_review_policy = "新規または更新した skill/agent は、TOML/YAML/Markdown 構文確認、必要に応じた quick_validate、既存 policy との整合確認、別エージェントによる phase-reviewer または verifier の APPROVE を Done 前に必須とする。"
completion_policy = "retrospective は、改善候補なしを Linear Comment に記録するか、改善 Issue の作成/更新と根拠 Comment の記録が終わったら完了とする。作成/更新した改善 Issue は project summary または retrospective Comment から辿れるようにする。"
labels_add = ["loop-improvement", "needs-retro", "capability-expansion", "skill-gap", "agent-gap"]
categories = [
  "prompt-debt",
  "test-debt",
  "automation-debt",
  "skill-gap",
  "agent-gap",
  "capability-expansion",
  "review-gap",
  "triage-gap",
  "documentation-gap",
  "tooling-gap",
  "process-risk",
]
comment_template = """
## 振り返り

対象:
読んだ Linear Issue / Comment:
見つけた悪かった点:
共通原因:
作成/更新した改善 Issue:
作成/更新した skill / agent:
自律修正してよい範囲:
needs-human にした判断:
残るリスク:
次:
"""

[automation]
name = "agentic-loop-daily"
kind = "cron"
execution_environment = "worktree"
suggested_rrule = "FREQ=DAILY;BYHOUR=9;BYMINUTE=0;BYSECOND=0"
timezone = "Asia/Tokyo"
max_work_items_per_run = 1
no_op_policy = "対象 work item が見つからない場合は、リポジトリファイルを変更せず automation run をアーカイブする。"
human_needed_policy = "エスカレーションを Linear に記録し、人間が確認できる状態で item を残す。"
prompt = """
$loop-engineering を使う。
作業発見の前に .codex/loop.toml を読む。
.codex/loop.toml の [run_modes] と [preflight] を確認する。preflight が未完了の場合は dry-run として扱い、Linear/GitHub/repository の mutation を適用せず、必要な mutation 提案だけを返す。
memory backend として $linear-memory を使う。
Linear Issue の新規作成、同期、分割、エスカレーション、title 更新提案が必要な場合は、.codex/loop.toml の memory.issue_title_policy に従って日本語 title を使う。英語原文、ログ、外部 issue/PR title は description または Comment に残す。
loop-managed Linear scope から境界付き work item を最大 1 件だけ発見する。
読み取り専用の実行準備状況分析には triage を使う。
needs-triage の Issue は直接 claim しない。triage 結果が実行可能なら、live-run の controller だけが needs-triage を外し ready-for-agent を付ける。
Backlog の Issue は直接 claim しない。triage 結果が実行可能なら、live-run の controller だけが Backlog -> Todo と needs-triage から ready-for-agent への label 置換を適用し、再読み込み後に claim 条件を満たすか確認する。
live-run の場合だけ、作業開始前に .codex/loop.toml の [claim] に従い、controller が対象 Issue を再読み込みして claim する。claim できない場合は作業せず次候補を探す。
live-run の場合だけ、.codex/loop.toml で許可された Linear status、label、comment の書き込みを controller が適用する。setup または dry-run の場合は必要な mutation 提案だけを返す。
読み取り専用エージェントに Linear、GitHub、リポジトリファイルを変更させない。
実装が必要な場合は $tdd-cycle を使う。
設計、テスト、実装、リファクタリング、最終検証の各 phase 後に $cross-review-gates を使う。
作業中に悪かった点、詰まり、検証不足、自動化できる手作業を見つけた場合は、Linear Comment または completion_evidence の loop 改善候補に簡潔に残す。
PJ の最後、milestone/release/主要 PR 完了前、または人間が振り返りを要求した場合は .codex/loop.toml の [retrospective] に従い、改善候補を集約して日本語 title の Linear 改善 Issue を作成または更新する。
既存 skill / agent では改善候補を解消できない場合は、.codex/loop.toml の retrospective.capability_expansion_policy に従って、新規 skill または新規 agent の作成を改善手段として扱ってよい。
完了前に受け入れ/E2E 証跡を確認し、永続化すべき結果を Linear に記録する。
Done にする前に .codex/loop.toml に従って完了証跡を Linear に書く。
受け入れ/E2E 検証を skip した、または実行できない場合は、Done にせず needs-human としてエスカレーションする。
"""

[completion_evidence]
comment_required = true
required_fields = [
  "Linear Issue",
  "目的",
  "受け入れ条件の結果",
  "受け入れ/E2E 証跡",
  "変更した成果物",
  "テストコマンド",
  "テスト結果",
  "設計レビュー",
  "テストレビュー",
  "実装レビュー",
  "リファクタリングレビュー",
  "最終検証レビュー",
  "GitHub リンクまたは該当なし",
  "スキップした確認",
  "loop 改善候補",
  "能力拡張",
  "残るリスク",
  "次のアクション",
]
review_gate_fields = [
  "設計レビュー: 計画とテストリストに対する phase-reviewer の判定、根拠、Linear Comment または run 証跡。",
  "テストレビュー: Red の失敗理由と追加/更新テストに対する phase-reviewer の判定、根拠、Linear Comment または run 証跡。",
  "実装レビュー: Green の最小実装とテスト結果に対する phase-reviewer の判定、根拠、Linear Comment または run 証跡。",
  "リファクタリングレビュー: リファクタリング有無、再テスト結果、phase-reviewer の判定、根拠、Linear Comment または run 証跡。",
  "最終検証レビュー: 受け入れ/E2E、関連検証、残リスクに対する verifier または phase-reviewer の判定、根拠、Linear Comment または run 証跡。",
]
done_requires = [
  "受け入れ条件が、通過した E2E、受け入れ、または最も外側に近い統合証跡で裏付けられている。",
  "必要な検証コマンドが通過している。",
  "completion_evidence.review_gate_fields の必要な review gate がすべて APPROVE になっており、各 gate の証跡を参照できる。",
  "受け入れ/E2E 検証を skip した場合は Done にせず、needs-human としてエスカレーションする。",
  "受け入れ以外の確認を skip した場合は、明確な理由を記録している。",
  "残るリスクがない場合も、その旨を記録している。",
  "GitHub branch、commit、PR、CI link が存在する場合は記録している。",
  "GitHub を使わない work item では、GitHub リンク欄に該当なしと理由を記録している。",
  "loop 改善候補がない場合も、その旨を記録している。",
  "skill/agent を新規作成または更新した場合は、能力拡張欄に対象、理由、検証、別エージェント review gate の結果を記録している。",
]
comment_template = """
## 完了証跡

Linear Issue:
目的:
受け入れ条件の結果:
受け入れ/E2E 証跡:
変更した成果物:
テストコマンド:
テスト結果:
設計レビュー:
テストレビュー:
実装レビュー:
リファクタリングレビュー:
最終検証レビュー:
GitHub リンクまたは該当なし:
スキップした確認:
loop 改善候補:
能力拡張:
残るリスク:
次のアクション:
"""
